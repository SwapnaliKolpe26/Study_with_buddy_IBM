<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Study With Buddy — Your AI-powered study companion powered by IBM watsonx.ai" />
  <title>{% block title %}Study With Buddy{% endblock %}</title>

  <!-- Bootstrap 5 CSS (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ── Navigation Bar ──────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg sticky-top" id="mainNav">
    <div class="container-fluid px-3 px-md-4">

      <!-- Brand -->
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <span class="brand-icon">🎓</span>
        <span class="brand-text">Study<span class="brand-accent">Buddy</span></span>
      </a>

      <!-- Mobile toggle -->
      <button
        class="navbar-toggler border-0"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent"
        aria-controls="navbarContent"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <i class="bi bi-list fs-4"></i>
      </button>

      <!-- Nav links -->
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
              <i class="bi bi-house me-1"></i>Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'chat' %}active{% endif %}" href="/chat">
              <i class="bi bi-chat-dots me-1"></i>Chat
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/dashboard">
              <i class="bi bi-bar-chart me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item ms-lg-2">
            <!-- Dark / Light mode toggle -->
            <button class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1" id="themeToggle" title="Toggle dark mode">
              <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
              <span id="themeLabel" class="d-none d-sm-inline">Dark Mode</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ── Page Content ──────────────────────────────────────── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ───────────────────────────────────────────── -->
  <footer class="site-footer mt-auto py-3">
    <div class="container text-center">
      <p class="mb-0 text-muted small">
        Made with <span class="text-danger">♥</span> using
        <strong>IBM watsonx.ai Granite</strong> &amp; Flask &nbsp;|&nbsp;
        Study With Buddy &copy; {{ now.year if now else 2025 }}
      </p>
    </div>
  </footer>

  <!-- Bootstrap 5 JS Bundle -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFpE/bmJ0aF7aBcEaE6kIfG1Cqq"
    crossorigin="anonymous"
  ></script>

  <!-- Custom JS -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
